# Release workflow for qb-engineer-server
#
# Triggers:
#   - push to main             -> auto-bumped semver: :X.Y.Z + :X.Y + :latest + :main-<sha>
#   - push of a v*.*.* tag     -> :X.Y.Z + :X.Y + :X (manual milestone, fully overrides VERSION)
#
# Versioning model (alpha): the repo's VERSION file holds MAJOR.MINOR.BASE
# manually (e.g. "0.0.0", "0.1.0", "1.0.0"). On every main push, CI computes:
#
#   patch    = BASE + (commits since VERSION was last touched)
#   version  = MAJOR.MINOR.patch
#
# So patch increments automatically on every main build; minor and major
# bumps are an explicit `VERSION` edit + commit (next CI build picks them
# up because the distance count resets to 0). No git tag pushing happens
# from inside the workflow, so no recursive build loop.
#
# Image goes to GHCR (ghcr.io/danielhokanson/qb-engineer-server) as a
# multi-arch manifest covering linux/arm64 (Raspberry Pi production target)
# and linux/amd64 (developer workstations, x86_64 testers). The runner is a
# native arm64 machine; amd64 is built via QEMU emulation. Cold-cache build
# time: ~25-40 min (vs ~12-15 min for arm64 alone). Cache hits keep
# subsequent builds fast.
#
# Tests gate the image push: a failing test means no image is published.

name: Release

on:
  push:
    branches: [main]
    tags: ['v*.*.*']

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: qb_engineer_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=qb_engineer_test;Username=postgres;Password=postgres"
      MockIntegrations: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build (warnings-as-errors)
        run: dotnet build --no-restore --configuration Release -warnaserror

      - name: Unit + integration tests
        run: dotnet test --no-build --configuration Release

  build-and-push:
    needs: test
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          # Need the full history so the version-compute step can count
          # commits since VERSION was last touched.
          fetch-depth: 0

      - name: Compute version (auto-bump patch on main)
        id: version
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          base=$(tr -d '[:space:]' < VERSION 2>/dev/null || echo "0.0.0")
          IFS='.' read -r major minor base_patch <<< "$base"
          # Most-recent commit that touched VERSION (or the root commit if
          # VERSION has only ever existed in one commit / was just added).
          anchor=$(git log -1 --format=%H -- VERSION 2>/dev/null || echo "")
          if [[ -z "$anchor" ]]; then
            distance=0
          else
            distance=$(git rev-list --count "${anchor}..HEAD")
          fi
          patch=$((base_patch + distance))
          version="${major}.${minor}.${patch}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "minor=${major}.${minor}" >> "$GITHUB_OUTPUT"
          echo "Computed image version: ${version} (base=${base}, distance=${distance})"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Main-push path: auto-bumped semver from VERSION file.
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ steps.version.outputs.minor }},enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=main-,format=short,enable=${{ github.ref == 'refs/heads/main' }}
            # Tag-push path: explicit milestone tag (manual git tag vX.Y.Z).
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./qb-engineer.api/Dockerfile
          push: true
          platforms: linux/arm64,linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
