# Release workflow for qb-engineer-server
#
# Triggers:
#   - push to main             -> auto-bumped semver: :X.Y.Z + :X.Y + :latest + :main-<sha>
#   - push of a v*.*.* tag     -> :X.Y.Z + :X.Y + :X (manual milestone, fully overrides VERSION)
#
# Versioning model (alpha): the repo's VERSION file holds MAJOR.MINOR.BASE
# manually (e.g. "0.0.0", "0.1.0", "1.0.0"). On every main push, CI computes:
#
#   patch    = BASE + (commits since VERSION was last touched)
#   version  = MAJOR.MINOR.patch
#
# Patch increments automatically on every main build; minor and major bumps
# are an explicit `VERSION` edit + commit (next CI build picks them up
# because the distance count resets to 0). No git tag pushing happens from
# inside the workflow, so no recursive build loop.
#
# Multi-arch model: linux/arm64 (Raspberry Pi production target) and
# linux/amd64 (x86_64 server-hardware deployments by testers/contributors).
# Both legs build NATIVELY on their own runners in parallel — no QEMU
# emulation. The previous single-job multi-arch build with QEMU regularly
# blew past the 30-minute timeout on the amd64 leg because the runtime
# image installs chromium + ffmpeg + playwright (~250MB Debian packages
# plus 270MB playwright downloads) and QEMU-emulated apt+chromium-install
# is 5-10x slower than native. The matrix split below runs each arch on
# its own native runner, then a final job merges the per-arch digests
# into a single manifest list under the published tags.
#
# Tests gate the image push: a failing test means no image is published.

name: Release

on:
  push:
    branches: [main]
    tags: ['v*.*.*']

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Force JavaScript-based actions (checkout, build-push, etc.) to run on
  # the runner's Node.js 24 binary instead of the default Node 20. Node 20
  # is deprecated on GitHub-hosted runners (forced default June 2026,
  # removed September 2026). The action publishers haven't all retagged
  # yet, but the runtime override flag works on every action.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: qb_engineer_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=qb_engineer_test;Username=postgres;Password=postgres"
      MockIntegrations: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build (warnings-as-errors)
        run: dotnet build --no-restore --configuration Release -warnaserror

      - name: Unit + integration tests
        run: dotnet test --no-build --configuration Release

  # Compute the version once on the test runner so both arch legs of the
  # build matrix tag identically. (Each matrix leg pushes by-digest only;
  # the merge job below applies the named tags to the manifest list.)
  compute-version:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      minor: ${{ steps.version.outputs.minor }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version (auto-bump patch on main)
        id: version
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          base=$(tr -d '[:space:]' < VERSION 2>/dev/null || echo "0.0.0")
          IFS='.' read -r major minor base_patch <<< "$base"
          anchor=$(git log -1 --format=%H -- VERSION 2>/dev/null || echo "")
          if [[ -z "$anchor" ]]; then
            distance=0
          else
            distance=$(git rev-list --count "${anchor}..HEAD")
          fi
          patch=$((base_patch + distance))
          version="${major}.${minor}.${patch}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "minor=${major}.${minor}" >> "$GITHUB_OUTPUT"
          echo "Computed image version: ${version} (base=${base}, distance=${distance})"

  build-and-push:
    needs: [test, compute-version]
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest (no tags yet)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./qb-engineer.api/Dockerfile
          platforms: ${{ matrix.platform }}
          # Push by-digest only; the merge job below applies the named tags
          # (semver, latest, main-<sha>) to the manifest list that combines
          # both arch digests.
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          # Per-arch GHA cache scope so amd64 and arm64 caches don't collide.
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.arch }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-manifests:
    needs: [compute-version, build-and-push]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Main-push path: auto-bumped semver from VERSION file.
            type=raw,value=${{ needs.compute-version.outputs.version }},enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ needs.compute-version.outputs.minor }},enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=main-,format=short,enable=${{ github.ref == 'refs/heads/main' }}
            # Tag-push path: explicit milestone tag (manual git tag vX.Y.Z).
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Create + push manifest list
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect resulting manifest
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.compute-version.outputs.version || steps.meta.outputs.version }}
