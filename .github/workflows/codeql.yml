# CodeQL static analysis for qb-engineer-server
#
# Scans the C# code for known vulnerability patterns. Findings appear in
# the Security tab. Free for public repos.

name: CodeQL

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
  schedule:
    - cron: '0 6 * * 1'    # weekly Monday 06:00 UTC

permissions:
  actions: read
  contents: read
  security-events: write

env:
  # Force JavaScript-based actions (checkout, etc.) to run on the runner's
  # Node.js 24 binary. Node 20 is deprecated on GitHub-hosted runners
  # (forced default June 2026, removed September 2026).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        language: ['csharp']

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Build
        run: dotnet build --configuration Release

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
