# Dependabot config for qb-engineer-server
#
# Weekly updates against develop. NuGet groups by category to reduce PR noise.

version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    target-branch: "develop"
    open-pull-requests-limit: 5
    groups:
      microsoft-extensions:
        patterns:
          - "Microsoft.Extensions.*"
          - "Microsoft.AspNetCore.*"
        update-types: ["minor", "patch"]
      entity-framework:
        patterns:
          - "Microsoft.EntityFrameworkCore*"
          - "Npgsql*"
        update-types: ["minor", "patch"]
      test-dependencies:
        patterns:
          - "xunit*"
          - "Moq"
          - "FluentAssertions"
          - "Bogus"
          - "Microsoft.NET.Test.Sdk"
        update-types: ["minor", "patch"]
      other:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: "docker"
    directory: "/qb-engineer.api"
    schedule:
      interval: "weekly"
      day: "monday"
    target-branch: "develop"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    target-branch: "develop"
